<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEST16 - Lo que uso, lo que recomiendo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .title-font { font-family: 'Space Grotesk', sans-serif; }
        .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="bg-black text-zinc-200 min-h-screen">

    <!-- NAVBAR -->
    <nav class="border-b border-zinc-800 bg-black/80 backdrop-blur-md fixed w-full z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-sky-400 rounded-2xl flex items-center justify-center text-black font-bold text-2xl title-font">B</div>
                <span class="title-font text-3xl font-semibold tracking-tighter">BEST16</span>
            </div>
            <div class="flex items-center gap-8">
                <a href="#catalogo" class="hover:text-sky-400">Catálogo</a>
                <a href="#reseñas" class="hover:text-sky-400">Reseñas</a>
                <button onclick="showAdminLogin()" class="flex items-center gap-2 px-5 py-2 bg-zinc-900 border border-zinc-700 rounded-2xl hover:bg-zinc-800">
                    <i class="fa-solid fa-lock"></i> Admin
                </button>
            </div>
        </div>
    </nav>

    <!-- HERO -->
    <header class="pt-24 pb-20 bg-gradient-to-b from-black to-zinc-950">
        <div class="max-w-7xl mx-auto px-6">
            <div class="grid md:grid-cols-2 gap-12 items-center">
                <div>
                    <div class="inline-flex items-center gap-2 bg-zinc-900 border border-zinc-700 px-5 py-2 rounded-3xl mb-6 text-sky-400">
                        <span class="text-amber-400">★</span> Página certificada ✅
                    </div>
                    <h1 class="title-font text-6xl md:text-7xl font-bold leading-none tracking-tighter">
                        Lo que <span class="text-sky-400">uso</span>,<br>lo que recomiendo
                    </h1>
                    <p class="mt-6 text-xl text-zinc-400">Productos reales que uso y recomiendo. Código <span class="font-bold text-white">BEST16</span></p>
                </div>
                <div class="bg-zinc-900 border border-sky-500/30 rounded-3xl p-10 text-center hero-glow">
                    <div class="text-6xl font-bold title-font mb-2">BEST16</div>
                    <p class="text-emerald-400 mb-6">16% de descuento</p>
                    <button onclick="copyCode()" class="w-full bg-white text-black py-5 rounded-2xl font-semibold text-lg">COPIAR CÓDIGO</button>
                </div>
            </div>
        </div>
    </header>

    <!-- CATÁLOGO -->
    <section id="catalogo" class="py-20">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex justify-between items-end mb-10">
                <h2 class="title-font text-5xl font-semibold">Catálogo</h2>
                <div id="category-filters" class="flex flex-wrap gap-3"></div>
            </div>
            
            <input id="search-input" type="text" placeholder="Buscar productos..." 
                   class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl py-6 px-8 text-lg mb-10 outline-none focus:border-sky-400"
                   onkeyup="filterProducts()">

            <div id="products-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8"></div>
            <div id="no-results" class="hidden text-center py-20 text-zinc-400">No se encontraron productos.</div>
        </div>
    </section>

    <!-- RESEÑAS -->
    <section id="reseñas" class="py-20 bg-zinc-950">
        <div class="max-w-7xl mx-auto px-6">
            <h2 class="title-font text-5xl font-semibold mb-12">Lo que dicen quienes compraron</h2>
            <div id="reviews-grid" class="grid md:grid-cols-3 gap-8"></div>
        </div>
    </section>

    <!-- ADMIN LOGIN -->
    <div id="admin-login-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[100]">
        <div class="bg-zinc-900 p-10 rounded-3xl w-full max-w-md">
            <h3 class="text-2xl mb-6">Acceso Administrador</h3>
            <input id="admin-pass" type="password" placeholder="Contraseña" class="w-full px-6 py-5 bg-zinc-800 rounded-2xl mb-4">
            <p id="login-error" class="text-red-500 hidden mb-4">Contraseña incorrecta</p>
            <button onclick="checkPassword()" class="w-full py-5 bg-white text-black rounded-2xl font-semibold">Entrar</button>
            <button onclick="hideLoginModal()" class="w-full mt-4 text-zinc-400">Cancelar</button>
        </div>
    </div>

    <!-- ADMIN PANEL -->
    <div id="admin-panel-modal" class="hidden fixed inset-0 bg-black/80 z-[110] flex items-center justify-center">
        <div class="bg-zinc-900 w-full max-w-5xl rounded-3xl max-h-[90vh] overflow-hidden">
            <div class="flex border-b border-zinc-700 p-6">
                <button onclick="switchAdminTab(0)" class="admin-tab px-8 py-3 font-medium border-b-2 border-sky-400">Productos</button>
                <button onclick="switchAdminTab(1)" class="admin-tab px-8 py-3 font-medium text-zinc-400">Reseñas</button>
                <button onclick="closeAdminPanel()" class="ml-auto text-3xl text-zinc-400">×</button>
            </div>
            <div id="admin-content" class="p-8 overflow-auto max-h-[calc(90vh-80px)]"></div>
        </div>
    </div>

    <script>
        // ================== CONFIGURA SUPABASE AQUÍ ==================
        const SUPABASE_URL = 'https://sbtyihqwnxdvsainchjb.supabase.co';     // ← Cambia esto
        const SUPABASE_ANON_KEY = 'sb_publishable_j27q-Esy0EjN_G-Xq53BeA_gKwFZc3L';               // ← Cambia esto
        
        const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        // ============================================================

        let products = [];
        let reviews = [];
        let currentFilter = 'Todos';

        async function loadData() {
            const { data: p } = await supabase.from('products').select('*').order('id', { ascending: false });
            const { data: r } = await supabase.from('reviews').select('*').order('id', { ascending: false });
            
            products = p || [];
            reviews = r || [];
            renderFilters();
            renderProducts();
            renderReviews();
        }

        function renderFilters() {
            const cats = ['Todos', 'Ropa', 'Calzado', 'Accesorios', 'Hogar'];
            let html = '';
            cats.forEach(cat => {
                const active = cat === currentFilter ? 'bg-white text-black' : 'border border-zinc-700 hover:bg-zinc-800';
                html += `<button onclick="setFilter('${cat}')" class="px-7 py-3 rounded-3xl text-sm ${active}">${cat}</button>`;
            });
            document.getElementById('category-filters').innerHTML = html;
        }

        function setFilter(cat) {
            currentFilter = cat;
            renderFilters();
            renderProducts();
        }

        function filterProducts() {
            renderProducts();
        }

        function renderProducts() {
            const grid = document.getElementById('products-grid');
            const search = document.getElementById('search-input').value.toLowerCase().trim();
            let filtered = products;

            if (currentFilter !== 'Todos') filtered = filtered.filter(p => p.category === currentFilter);
            if (search) {
                filtered = filtered.filter(p => 
                    p.name.toLowerCase().includes(search) || 
                    (p.desc && p.desc.toLowerCase().includes(search))
                );
            }

            if (filtered.length === 0) {
                document.getElementById('no-results').classList.remove('hidden');
                grid.innerHTML = '';
                return;
            }

            document.getElementById('no-results').classList.add('hidden');

            let html = '';
            filtered.forEach(p => {
                html += `
                <div class="product-card bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden">
                    <div class="h-80 bg-zinc-950">
                        <img src="${p.img}" class="w-full h-full object-cover" onerror="this.src='https://picsum.photos/id/1015/400/500'">
                    </div>
                    <div class="p-6">
                        <div class="font-semibold text-lg mb-2">${p.name}</div>
                        <p class="text-zinc-400 text-sm mb-4 line-clamp-2">${p.desc || ''}</p>
                        <div class="flex justify-between items-center">
                            <span class="text-3xl font-bold">${p.price}€</span>
                            <a href="${p.link}" target="_blank" class="bg-sky-400 hover:bg-sky-300 text-black px-6 py-3 rounded-2xl text-sm font-medium">Ver en Hacoo</a>
                        </div>
                    </div>
                </div>`;
            });
            grid.innerHTML = html;
        }

        function renderReviews() {
            const container = document.getElementById('reviews-grid');
            let html = '';
            reviews.forEach(r => {
                const stars = '★'.repeat(r.stars) + '☆'.repeat(5 - r.stars);
                html += `
                <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-8">
                    <div class="flex items-center gap-4 mb-6">
                        <div class="w-12 h-12 bg-zinc-700 rounded-2xl flex items-center justify-center text-xl font-bold">${r.name[0]}</div>
                        <div>
                            <div class="font-medium">${r.name}</div>
                            <div class="text-amber-400">${stars}</div>
                        </div>
                    </div>
                    <p class="italic">"${r.comment}"</p>
                </div>`;
            });
            container.innerHTML = html;
        }

        function copyCode() {
            navigator.clipboard.writeText('BEST16');
            alert('¡Código BEST16 copiado!');
        }

        // ================== ADMIN ==================
        function showAdminLogin() {
            document.getElementById('admin-login-modal').classList.remove('hidden');
        }

        function hideLoginModal() {
            document.getElementById('admin-login-modal').classList.add('hidden');
            document.getElementById('login-error').classList.add('hidden');
        }

        function checkPassword() {
            if (document.getElementById('admin-pass').value === 'David14') {
                hideLoginModal();
                document.getElementById('admin-panel-modal').classList.remove('hidden');
                switchAdminTab(0);
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        function closeAdminPanel() {
            document.getElementById('admin-panel-modal').classList.add('hidden');
        }

        function switchAdminTab(tab) {
            document.querySelectorAll('.admin-tab').forEach((el, i) => {
                if (i === tab) el.classList.add('border-b-2', 'border-sky-400');
                else el.classList.remove('border-b-2', 'border-sky-400');
            });

            const content = document.getElementById('admin-content');
            if (tab === 0) {
                content.innerHTML = `
                    <h3 class="text-2xl font-semibold mb-6">Añadir Producto</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <input id="new-name" placeholder="Nombre" class="bg-zinc-800 px-5 py-4 rounded-2xl">
                        <input id="new-price" type="number" step="0.01" placeholder="Precio €" class="bg-zinc-800 px-5 py-4 rounded-2xl">
                        <select id="new-category" class="bg-zinc-800 px-5 py-4 rounded-2xl">
                            <option>Ropa</option><option>Calzado</option><option>Accesorios</option><option>Hogar</option>
                        </select>
                        <input id="new-img" placeholder="URL Imagen" class="bg-zinc-800 px-5 py-4 rounded-2xl">
                        <input id="new-link" placeholder="Link de afiliado" class="bg-zinc-800 px-5 py-4 rounded-2xl">
                        <textarea id="new-desc" placeholder="Descripción" rows="3" class="bg-zinc-800 px-5 py-4 rounded-2xl col-span-2"></textarea>
                        <button onclick="addProduct()" class="bg-sky-400 text-black py-5 rounded-2xl font-semibold col-span-2">Añadir Producto</button>
                    </div>
                    <h4 class="mt-12 mb-4 font-medium">Productos actuales</h4>
                    <div id="admin-prod-list" class="space-y-4"></div>
                `;
                renderAdminProducts();
            } else {
                content.innerHTML = `
                    <h3 class="text-2xl font-semibold mb-6">Añadir Reseña</h3>
                    <input id="rev-name" placeholder="Nombre" class="bg-zinc-800 px-5 py-4 rounded-2xl w-full mb-4">
                    <select id="rev-stars" class="bg-zinc-800 px-5 py-4 rounded-2xl w-full mb-4">
                        <option value="5">5 Estrellas</option><option value="4">4 Estrellas</option><option value="3">3 Estrellas</option>
                    </select>
                    <textarea id="rev-comment" placeholder="Comentario" rows="4" class="bg-zinc-800 px-5 py-4 rounded-2xl w-full mb-6"></textarea>
                    <button onclick="addReview()" class="bg-sky-400 text-black py-5 rounded-2xl font-semibold w-full">Añadir Reseña</button>
                    <h4 class="mt-12 mb-4 font-medium">Reseñas actuales</h4>
                    <div id="admin-rev-list" class="space-y-4"></div>
                `;
                renderAdminReviews();
            }
        }

        async function addProduct() {
            const newProduct = {
                name: document.getElementById('new-name').value,
                desc: document.getElementById('new-desc').value,
                category: document.getElementById('new-category').value,
                price: parseFloat(document.getElementById('new-price').value),
                img: document.getElementById('new-img').value,
                link: document.getElementById('new-link').value
            };
            await supabase.from('products').insert([newProduct]);
            loadData();
        }

        async function deleteProduct(id) {
            if (confirm('¿Eliminar producto?')) {
                await supabase.from('products').delete().eq('id', id);
                loadData();
            }
        }

        function renderAdminProducts() {
            const container = document.getElementById('admin-prod-list');
            let html = '';
            products.forEach(p => {
                html += `
                <div class="flex justify-between items-center bg-zinc-800 p-5 rounded-2xl">
                    <div>
                        <div class="font-medium">${p.name}</div>
                        <div class="text-xs text-zinc-500">${p.category} — ${p.price}€</div>
                    </div>
                    <button onclick="deleteProduct(${p.id})" class="text-red-400">Eliminar</button>
                </div>`;
            });
            container.innerHTML = html;
        }

        async function addReview() {
            const newReview = {
                name: document.getElementById('rev-name').value,
                stars: parseInt(document.getElementById('rev-stars').value),
                comment: document.getElementById('rev-comment').value
            };
            await supabase.from('reviews').insert([newReview]);
            loadData();
        }

        async function deleteReview(id) {
            if (confirm('¿Eliminar reseña?')) {
                await supabase.from('reviews').delete().eq('id', id);
                loadData();
            }
        }

        function renderAdminReviews() {
            const container = document.getElementById('admin-rev-list');
            let html = '';
            reviews.forEach(r => {
                html += `
                <div class="bg-zinc-800 p-5 rounded-2xl">
                    <div class="flex justify-between">
                        <span>${r.name} (${r.stars}★)</span>
                        <button onclick="deleteReview(${r.id})" class="text-red-400">Eliminar</button>
                    </div>
                    <p class="mt-3">"${r.comment}"</p>
                </div>`;
            });
            container.innerHTML = html;
        }

        window.onload = () => {
            loadData();
            lucide.createIcons();
        };
    </script>
</body>
</html>
